name: ota_generator
description: Source code generator to help create multi-language string translation with update over the air without any charges.
repository: https://github.com/aldychris/ota_string/tree/master/ota_generator
version: 0.0.7

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.41.2"

dependencies:
  analyzer: ">=8.0.0 <13.0.0"
  build: ^4.0.0
  source_gen: ^4.2.0
  source_helper: ^1.3.8
  dio: ^5.3.2
  hive: ^2.2.3
  ota_string: ^0.0.6
  # Path so apps using local ota_string do not conflict with hosted constraint.
  #  ota_string:
  #    path: ../ota_string

dev_dependencies:
  build_test: ^3.5.0
  build_runner: ^2.13.0
  lints: ^6.0.0
